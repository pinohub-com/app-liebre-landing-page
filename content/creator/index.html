<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Creator — Parrilla Flou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <header>
      <div>
        <span class="title">Slide Creator</span>
        <span class="subtitle">Flou — Parrilla 30 días</span>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-section sidebar-section-first">
        <h4>Parrilla</h4>
        <select id="parrilla-select" class="parrilla-select">
          <option value="parrilla.json">Parrilla principal</option>
        </select>
        <label class="parrilla-file-btn">
          <input type="file" id="parrilla-file-input" accept=".json,application/json" hidden>
          <span>Cargar desde archivo</span>
        </label>
      </div>
      <div id="day-list"></div>
      <div class="sidebar-section">
        <h4>Fondo global</h4>
        <label class="upload-btn">
          <input type="file" id="bg-input" accept="image/*" hidden>
          <span>+ Imagen de fondo</span>
        </label>
        <button type="button" class="btn-clear-bg" id="btn-clear-bg">Quitar fondo</button>
      </div>
    </aside>

    <main class="main">
      <div class="preview-wrapper">
        <div class="preview-label-row">
          <span class="preview-label">Vista previa</span>
          <div class="format-selector">
            <button type="button" class="format-btn" data-format="1:1" title="1:1 Feed">1:1</button>
            <button type="button" class="format-btn active" data-format="4:5" title="4:5 Carrusel">4:5</button>
            <button type="button" class="format-btn" data-format="9:16" title="9:16 Reel">9:16</button>
          </div>
        </div>
        <p class="preview-dimensions" id="preview-dimensions">1080×1350</p>
        <div class="preview-container" id="preview-container">
          <div id="export-slide" class="export-slide" data-format="4:5">
            <div class="slide-bg">
              <div class="slide-bg-texture" id="slide-bg-texture"></div>
              <div class="slide-bg-custom" id="slide-bg-custom"></div>
              <div class="slide-bg-photo" id="slide-bg-photo"></div>
            </div>
            <div class="slide-content" id="slide-content">
              <div class="slide-logo"><img src="logo.svg" alt="Flou" /></div>
              <span class="slide-type-badge" id="slide-type-badge"></span>
              <div class="slide-spacer-title-top" id="slide-spacer-title-top"></div>
              <div class="slide-title" id="preview-title"></div>
              <div class="slide-spacer-title-bottom" id="slide-spacer-title-bottom"></div>
              <div class="slide-spacer-body-top" id="slide-spacer-body-top"></div>
              <div class="slide-body" id="preview-body"></div>
              <div class="slide-spacer-body-bottom" id="slide-spacer-body-bottom"></div>
              <div class="slide-cta-box" id="slide-cta-box">
                <span class="cta-icon">💬</span>
                <span class="cta-text" id="preview-cta"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="nav-slides" id="nav-slides"></div>
      <div class="nav-arrows">
        <button type="button" id="btn-prev">← Anterior</button>
        <button type="button" id="btn-next">Siguiente →</button>
      </div>
      <div class="export-actions">
        <button type="button" class="btn-export-jpg" id="btn-export-one">Descargar slide actual (JPG)</button>
        <button type="button" class="btn-export-all" id="btn-export-all">Descargar los 8 slides (JPG)</button>
      </div>
      <div class="convert-video-section">
        <h4 class="export-video-title">🎬 Crear Reel (MP4)</h4>
        <div class="video-presets">
          <button type="button" class="preset-btn" data-preset="15">Rápido 15s</button>
          <button type="button" class="preset-btn active" data-preset="30">Estándar 30s</button>
          <button type="button" class="preset-btn" data-preset="45">Completo 45s</button>
        </div>
        <label class="video-word-duration-opt">
          <input type="checkbox" id="video-duration-by-words">
          <span>Duración según palabras</span>
          <input type="number" id="video-words-per-second" min="1" max="10" value="2" step="0.1" title="Palabras por segundo">
          <span class="video-words-per-sec-suffix">palabras/seg</span>
        </label>
        <div class="video-controls">
          <div class="editor-group compact" id="video-slide-duration-wrap">
            <label for="video-slide-duration">Seg por slide</label>
            <input type="number" id="video-slide-duration" min="1.5" max="10" value="3" step="0.5">
          </div>
          <div class="editor-group compact">
            <label for="video-transition">Transición</label>
            <select id="video-transition">
              <option value="none">Ninguna</option>
              <option value="fade" selected>Crossfade</option>
              <option value="slide-left">← Slide izq</option>
              <option value="slide-right">Slide der →</option>
              <option value="slide-up">↑ Slide arriba</option>
              <option value="slide-down">Slide abajo ↓</option>
              <option value="zoom-in">Zoom in</option>
              <option value="zoom-out">Zoom out</option>
            </select>
          </div>
          <div class="editor-group compact">
            <label for="video-transition-duration">Transición (seg)</label>
            <input type="number" id="video-transition-duration" min="0" max="2" value="0.5" step="0.1">
          </div>
        </div>
        <p class="video-duration-hint" id="video-duration-hint">~28 s total · MP4 1080×1350</p>
        <div class="convert-buttons-row">
          <button type="button" class="btn-convert-video" id="btn-convert-video">Convertir a MP4</button>
          <button type="button" class="btn-convert-local" id="btn-convert-local">Convertir localmente</button>
        </div>
        <p class="convert-local-hint">MP4 en nube (1080p) o en navegador (720p, sin subir).</p>
        <div class="convert-progress hidden" id="convert-progress">
          <div class="progress-bar"><div class="progress-fill" id="convert-progress-fill"></div></div>
          <span class="progress-text" id="convert-progress-text">Subiendo...</span>
        </div>
        <div class="convert-result hidden" id="convert-result">
          <button type="button" id="convert-download-link" class="btn-download-mp4">Descargar MP4 (abre en nueva pestaña)</button>
          <span class="convert-error hidden" id="convert-error"></span>
        </div>
      </div>
    </main>

    <aside class="editor">
      <div class="day-meta" id="day-meta">
        <div class="day-title" id="day-title"></div>
        <div class="day-objetivo" id="day-objetivo"></div>
      </div>
      <h3>Slide <span id="slide-num">1</span> de 8</h3>
      <div class="editor-group">
        <label>Imagen para este slide (opcional)</label>
        <label class="upload-btn small">
          <input type="file" id="slide-img-input" accept="image/*" hidden>
          <span id="slide-img-label">+ Foto del slide</span>
        </label>
        <div class="opacity-slider-wrap">
          <label for="slide-img-opacity">Opacidad imagen <span id="slide-opacity-value">30</span>%</label>
          <input type="range" id="slide-img-opacity" min="5" max="80" value="30" step="5">
        </div>
      </div>
      <div class="editor-group">
        <label>Tipo</label>
        <select id="edit-type"></select>
      </div>
      <div class="editor-group">
        <label>Título</label>
        <div class="input-with-color">
          <input type="color" id="edit-title-color" value="#232323" class="color-btn" title="Color del título">
          <input type="text" id="edit-title" placeholder="Texto principal">
        </div>
        <div class="title-style-wrap">
          <div class="slider-row">
            <label for="edit-title-size">Tamaño <span id="title-size-value">1.35</span>rem</label>
            <input type="range" id="edit-title-size" min="0.9" max="2.2" value="1.35" step="0.05">
          </div>
          <div class="slider-row">
            <label for="edit-text-vertical">Posición vertical <span id="text-vertical-value">50</span>%</label>
            <input type="range" id="edit-text-vertical" min="0" max="100" value="50" step="5">
          </div>
        </div>
      </div>
      <div class="editor-group">
        <label>Cuerpo / Descripción</label>
        <div class="input-with-color">
          <input type="color" id="edit-body-color" value="#000000" class="color-btn" title="Color del cuerpo">
          <textarea id="edit-body" placeholder="Subtítulo o descripción"></textarea>
        </div>
        <div class="body-style-wrap">
          <div class="slider-row">
            <label for="edit-body-size">Tamaño <span id="body-size-value">0.9</span>rem</label>
            <input type="range" id="edit-body-size" min="0.65" max="1.4" value="0.9" step="0.05">
          </div>
          <div class="slider-row">
            <label for="edit-body-vertical">Posición vertical <span id="body-vertical-value">50</span>%</label>
            <input type="range" id="edit-body-vertical" min="0" max="100" value="50" step="5">
          </div>
        </div>
      </div>
      <button type="button" class="btn-copy" id="btn-copy-slide">Copiar slide al portapapeles</button>
      <button type="button" class="btn-export" id="btn-export-day">Exportar día como JSON</button>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
