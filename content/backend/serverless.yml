service: flou-video-converter

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 1024
  timeout: 29
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedMethods:
        - GET
        - OPTIONS
        - POST
        - PUT
      allowedHeaders:
        - Content-Type
        - Authorization
      allowCredentials: false
  environment:
    BUCKET_NAME: !Ref VideoBucket
    QUEUE_URL: !Ref VideoConvertQueue
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:HeadObject
          Resource: !Sub 'arn:aws:s3:::${VideoBucket}/*'
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource: !Sub 'arn:aws:s3:::${VideoBucket}'
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt VideoConvertQueue.Arn
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: !GetAtt VideoConvertQueue.Arn

package:
  patterns:
    - '!node_modules/**'
    - '!layer/**'
    - '!*.md'

functions:
  getUploadUrl:
    handler: handler.get_upload_url
    description: Retorna URL firmada para subir el WebM a S3
    events:
      - httpApi:
          path: /upload-url
          method: post

  enqueueConvert:
    handler: handler.enqueue_convert
    description: Encola la conversión en SQS
    events:
      - httpApi:
          path: /convert
          method: post

  getStatus:
    handler: handler.get_status
    description: Indica si el MP4 está listo y retorna downloadUrl
    events:
      - httpApi:
          path: /status
          method: get

  videoConverter:
    handler: handler.convert_video_worker
    description: "Procesa mensajes SQS: descarga WebM, convierte a MP4, sube a S3"
    memorySize: 2048
    timeout: 900
    events:
      - sqs:
          arn: !GetAtt VideoConvertQueue.Arn
          batchSize: 1

layers:
  ffmpeg:
    path: layer
    name: ${self:service}-${self:provider.stage}-ffmpeg
    description: FFmpeg static binary for video conversion

resources:
  extensions:
    VideoConverterLambdaFunction:
      Properties:
        Layers:
          - Ref: FfmpegLambdaLayer
  Resources:
    VideoConvertQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-convert
        VisibilityTimeout: 960
        MessageRetentionPeriod: 86400
        ReceiveMessageWaitTimeSeconds: 0

    VideoBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-videos-${aws:accountId}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, HEAD]
              AllowedOrigins: ['*']
              ExposedHeaders: ['ETag']
        LifecycleConfiguration:
          Rules:
            - Id: DeleteUploads
              Status: Enabled
              Prefix: uploads/
              ExpirationInDays: 1
            - Id: DeleteConverted
              Status: Enabled
              Prefix: converted/
              ExpirationInDays: 1

  Outputs:
    ApiEndpoint:
      Description: URL base de la API
      Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
      Export:
        Name: ${self:service}-${self:provider.stage}-api-url
    BucketName:
      Description: Nombre del bucket de videos
      Value: !Ref VideoBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-bucket
