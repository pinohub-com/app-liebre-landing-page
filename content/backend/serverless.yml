service: flou-video-converter

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 1024
  timeout: 29
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedMethods:
        - GET
        - OPTIONS
        - POST
      allowedHeaders:
        - Content-Type
        - Authorization
      allowCredentials: false
  environment:
    BUCKET_NAME: !Ref VideoBucket
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:HeadObject
          Resource: !Sub 'arn:aws:s3:::${VideoBucket}/*'
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource: !Sub 'arn:aws:s3:::${VideoBucket}'

package:
  patterns:
    - '!node_modules/**'
    - '!layer/**'
    - '!*.md'

functions:
  createReel:
    handler: handler.create_reel_from_slides
    description: Recibe 8 imágenes base64, crea MP4 en full res, retorna downloadUrl
    memorySize: 4096
    timeout: 120
    layers:
      - Ref: FfmpegLambdaLayer
    events:
      - httpApi:
          path: /create-reel
          method: post

layers:
  ffmpeg:
    path: layer
    name: ${self:service}-${self:provider.stage}-ffmpeg
    description: FFmpeg static binary for video conversion

resources:
  Resources:
    VideoBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-videos-${aws:accountId}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, HEAD]
              AllowedOrigins: ['*']
              ExposedHeaders: ['ETag']
        LifecycleConfiguration:
          Rules:
            - Id: DeleteReels
              Status: Enabled
              Prefix: reels/
              ExpirationInDays: 1

  Outputs:
    ApiEndpoint:
      Description: URL base de la API
      Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
      Export:
        Name: ${self:service}-${self:provider.stage}-api-url
    BucketName:
      Description: Nombre del bucket de videos
      Value: !Ref VideoBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-bucket
